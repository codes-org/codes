schema_version: 1

# YAML twin of modelnet-mpi-test-torus.conf: a 3-dimensional 4x4x2 torus (32
# nodes). torus folds routing into the terminal node, so there is no separate
# router LP; dim_length is a comma-separated string carried verbatim.

components:
  compute_host:
    model: nw-lp

topology:
  format: parametric
  fabric:
    model: torus
    shape:
      n_dims: 3
      dim_length: "4,4,2"
    packet_size: 512
    message_size: 768
    modelnet_scheduler: fcfs
    net_startup_ns: 1.5
    net_bw_mbps: 20000
    link_bandwidth: 10.0
    buffer_size: 8192
    chunk_size: 256
  hosts:
    component: compute_host
