schema_version: 1

# YAML twin of modelnet-test-dragonfly-edison.conf: a file-enumerated
# dragonfly-custom modeling Edison (6x16 router mesh per group, 15 groups ->
# 1440 routers). Shape counts must match the binary connection files.

components:
  compute_host:
    model: nw-lp

topology:
  format: parametric
  fabric:
    model: dragonfly-custom
    shape:
      num_router_rows: 6
      num_router_cols: 16
      num_groups: 15
      num_cns_per_router: 4
      num_global_channels: 10
    links:
      local:  { bandwidth: 5.25, vc_size: 8192 }
      global: { bandwidth: 1.5,  vc_size: 16384 }
      cn:     { bandwidth: 8.0,  vc_size: 8192 }
    routing:
      algorithm: minimal
    connections:
      intra: "../src/network-workloads/conf/dragonfly-custom/intra-edison"
      inter: "../src/network-workloads/conf/dragonfly-custom/inter-edison"
    packet_size: 1024
    chunk_size: 1024
    message_size: 608
    modelnet_scheduler: fcfs
  hosts:
    component: compute_host
