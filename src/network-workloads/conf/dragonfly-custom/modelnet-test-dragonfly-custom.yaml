schema_version: 1

# YAML twin of modelnet-test-dragonfly-custom.conf: a file-enumerated
# dragonfly-custom (4x20 router mesh per group, 20 groups -> 1600 routers,
# 6400 nodes) -- the fabric the committed intra-custom/inter-custom files encode,
# as documented in README.dragonfly-custom.txt. The compiler derives repetitions
# = num_groups * num_router_rows * num_router_cols, with num_cns_per_router
# terminals plus one router LP per repetition. Shape counts must match the binary
# connection files: num_global_channels is 6 because inter-custom gives some
# routers 6 outgoing global links, and num_row_chans/num_col_chans are left at
# the model defaults (1 and 3), which the intra-custom row/column links match.

components:
  compute_host:
    model: nw-lp

topology:
  format: parametric
  fabric:
    model: dragonfly-custom
    shape:
      num_router_rows: 4
      num_router_cols: 20
      num_groups: 20
      num_cns_per_router: 4
      num_global_channels: 6
    links:
      local:  { bandwidth: 5.25, vc_size: 8192 }
      global: { bandwidth: 1.5,  vc_size: 16384 }
      cn:     { bandwidth: 8.0,  vc_size: 8192 }
    routing:
      algorithm: prog-adaptive
    connections:
      intra: "../src/network-workloads/conf/dragonfly-custom/intra-custom"
      inter: "../src/network-workloads/conf/dragonfly-custom/inter-custom"
    packet_size: 1024
    chunk_size: 1024
    message_size: 608
    modelnet_scheduler: fcfs
  hosts:
    component: compute_host
