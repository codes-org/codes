schema_version: 1

# YAML twin of modelnet-test-dragonfly-theta.conf: a file-enumerated
# dragonfly-custom modeling Theta (6x16 router mesh per group, 9 groups -> 864
# routers). Shape counts must match the binary connection files.

components:
  compute_host:
    model: nw-lp

topology:
  format: parametric
  fabric:
    model: dragonfly-custom
    shape:
      num_router_rows: 6
      num_router_cols: 16
      num_groups: 9
      num_cns_per_router: 4
      num_global_channels: 4
    links:
      local:  { bandwidth: 5.25, vc_size: 8192 }
      global: { bandwidth: 1.5,  vc_size: 16384 }
      cn:     { bandwidth: 16.0, vc_size: 8192 }
    routing:
      algorithm: adaptive
    connections:
      intra: "../src/network-workloads/conf/dragonfly-custom/intra-theta"
      inter: "../src/network-workloads/conf/dragonfly-custom/inter-theta"
    packet_size: 2048
    chunk_size: 2048
    message_size: 624
    modelnet_scheduler: fcfs
  hosts:
    component: compute_host
