schema_version: 1

# YAML twin of modelnet-mpi-test-cry-router.conf: 10 peer compute nodes running a
# workload over a simplenet NIC (flat all-to-all).

components:
  compute_node:
    model: nw-lp
    network: simplenet
    packet_size: 512
    message_size: 296
    modelnet_scheduler: fcfs
    net_startup_ns: 1.5
    net_bw_mbps: 20000

topology:
  format: flat
  component: compute_node
  nodes: 10
