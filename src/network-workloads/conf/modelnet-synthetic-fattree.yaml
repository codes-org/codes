schema_version: 1

# YAML twin of modelnet-synthetic-fattree.conf: a 3-level fat-tree, expressed in
# the parametric-fabric form. The compiler derives the per-edge-switch layout
# from the shape (switch_count edge switches, switch_radix/2 terminals each, one
# switch per level) and emits the PARAMS the fattree model reads. The fattree
# bandwidth/vc parameters are named flat rather than per link-class, so they are
# carried directly.

components:
  compute_host:
    model: nw-lp

topology:
  format: parametric
  fabric:
    model: fattree
    shape:
      num_levels: 3
      switch_count: 32
      switch_radix: 8
    routing:
      algorithm: adaptive
    ft_type: 0
    packet_size: 512
    message_size: 512
    chunk_size: 512
    modelnet_scheduler: fcfs
    router_delay: 90
    terminal_radix: 1
    soft_delay: 1000
    vc_size: 65536
    cn_vc_size: 65536
    link_bandwidth: 12.5
    cn_bandwidth: 12.5
    rail_routing: adaptive
  hosts:
    component: compute_host
