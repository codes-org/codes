schema_version: 1

# YAML twin of modelnet-test-simplenet.conf: sixteen peer compute nodes running
# a workload over a simplenet NIC. A flat topology is just a component (the
# workload plus its NIC model) and a node count -- simplenet is a uniform
# all-to-all model, so there is no matrix file and no explicit node graph, and
# the net params sit directly on the component.
#
# The dimensioned params carry explicit units (see doc/dev/yaml-config.md): they
# convert to the exact same internal values as the bare numbers in the .conf twin
# -- sizes to bytes, the startup latency to ns, and net_bw_mbps to MiB/s (its
# internal unit, which the "mbps" name does not match). Bandwidth especially
# reads better tagged, since the internal unit differs across models.

components:
  compute_node:
    model: nw-lp
    network: simplenet
    packet_size: 512B
    message_size: 464B
    modelnet_scheduler: fcfs
    net_startup_ns: 1.5ns
    net_bw_mbps: 20000MiBps

topology:
  format: flat
  component: compute_node
  nodes: 16
