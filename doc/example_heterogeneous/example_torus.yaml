schema_version: 1

# YAML twin of example_torus.conf: like example.yaml, but each compute cluster
# (foo, bar) is a torus with its own dimensions, and the forwarders bridge over
# simplenet. The same torus model appears per-cluster under an annotation, so
# this uses the explicit-groups form with type@annotation LP entries and matching
# @-annotated PARAMS. dim_length@foo/@bar are comma-separated strings the model
# parses itself. The custom run_params section is carried through under sections:.

topology:
  format: groups
  params:
    message_size: 352
    modelnet_order: [torus, simplenet]
    packet_size@foo: 8192
    modelnet_scheduler@foo: fcfs
    n_dims@foo: 3
    dim_length@foo: "4,2,2"
    link_bandwidth@foo: 2.0
    buffer_size@foo: 8192
    num_vc@foo: 1
    chunk_size@foo: 32
    packet_size@bar: 2048
    modelnet_scheduler@bar: round-robin
    n_dims@bar: 2
    dim_length@bar: "4,4"
    link_bandwidth@bar: 2.0
    buffer_size@bar: 8192
    num_vc@bar: 1
    chunk_size@bar: 32
    packet_size: 4096
    modelnet_scheduler: fcfs
    net_startup_ns: 8.0
    net_bw_mbps: 5000
  groups:
    FOO_CLUSTER:
      repetitions: 12
      lps:
        node: 1
        modelnet_torus@foo: 1
    FOO_FORWARDERS:
      repetitions: 4
      lps:
        forwarder: 1
        modelnet_torus@foo: 1
        modelnet_simplenet: 1
    BAR_CLUSTER:
      repetitions: 12
      lps:
        node: 1
        modelnet_torus@bar: 1
    BAR_FORWARDERS:
      repetitions: 4
      lps:
        forwarder: 1
        modelnet_torus@bar: 1
        modelnet_simplenet: 1

sections:
  run_params:
    num_reqs: 5
    payload_sz: 16384
