# Representative organization-to-organization WAN example:
# - 100 Gbps terminal/access links inside each site
# - 10-30 Gbps inter-site links carried by an ISP or research/enterprise WAN
# - 64 Gb (8 GB) shared deep buffer per WAN switch/router
#
# A->C intentionally routes through B, while C->A has a direct 20 Gbps link,
# preserving an asymmetric multi-hop path for rate-feedback validation.
topology:
  switches:
    A:
      terminals: 2
      terminal_bandwidth: "100 Gbps"
      switch_buffer: "64 Gb"
      connections:
        B: "30 Gbps"

    B:
      terminals: 2
      terminal_bandwidth: "100 Gbps"
      switch_buffer: "64 Gb"
      connections:
        A: "30 Gbps"
        C: "10 Gbps"

    C:
      terminals: 2
      terminal_bandwidth: "100 Gbps"
      switch_buffer: "64 Gb"
      connections:
        A: "20 Gbps"
        B: "10 Gbps"
