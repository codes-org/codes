name: Build
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    # Daily at 07:00 UTC. Catches drift between pin bumps — runner image
    # updates, apt/brew package bumps, and ROSS @ master moving forward. The
    # scheduled run intentionally ignores ROSS_REF and builds against
    # ROSS-org/ROSS@master so a stale pin still surfaces problems.
    - cron: "0 7 * * *"

# CI for CODES.
#
# Matrix: {ubuntu-24.04, macos-14 / Apple Silicon} x {MPICH, OpenMPI}. Each leg
# builds a freshly built ROSS pinned to a SHA, then CODES, then ctest. MPI is
# auto-discovered via find_package(MPI), so the same CMake works for both impls
# — the matrix just installs one MPI per leg (apt/brew). Heavy optional deps
# (SWM, UNION, DUMPI, TORCH, ZEROMQ) stay OFF so every leg runs on a stock
# runner with no custom image.
#
# The macOS leg is the safety net for Mac-specific link/include breakage, which
# has historically reached master and had to be hand-fixed on a developer Mac.
#
# Still deferred: OpenMPI alongside MPICH, ubuntu-22.04, a
# gcc/clang compiler matrix, coverage tracking, and a heavy-deps "full" job.
# Still deferred: ubuntu-22.04, a gcc/clang compiler matrix,
# coverage tracking, and a heavy-deps "full" job.
#
# Symmetric with ROSS's codes-contract.yml: ROSS pins CODES, CODES pins
# ROSS, each catches consumer-API regressions in the other.

jobs:
  build:
    name: build (${{ matrix.os }}, ${{ matrix.mpi }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't let one leg's failure cancel the others — we want to see every
      # OS x MPI result on every run.
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
        mpi: [mpich, openmpi]
    env:
      # ross-org/ROSS @ master as of 2026-06-17.
      # Bump this SHA whenever CODES needs to track ROSS forward — that
      # bump is a one-line reviewed change.
      # TODO: promote to a workflow variable + cache the
      # built ROSS by SHA so unchanged pins skip the rebuild.
      ROSS_REF: 9b6ccb18f9b9db438bf41b5b221d0ef16a4dac48
      # OpenMPI refuses to launch more ranks than detected slots. CODES test
      # scripts invoke `mpirun -np N` directly (up to np=3 in the core config),
      # so --oversubscribe can't be routed through CMake's MPIEXEC_PREFLAGS;
      # these env vars enable oversubscription for OpenMPI 4 (OMPI_MCA_*, apt)
      # and 5 (PRTE_MCA_*, brew). MPICH ignores them, so they're harmless on the
      # MPICH legs.
      OMPI_MCA_rmaps_base_oversubscribe: "1"
      PRTE_MCA_rmaps_default_mapping_policy: ":oversubscribe"
    steps:
      - name: Checkout CODES
        uses: actions/checkout@v4
        with:
          path: codes

      - name: Checkout ROSS
        uses: actions/checkout@v4
        with:
          repository: ROSS-org/ROSS
          # Push/PR runs use the pin; the nightly scheduled run tracks
          # ROSS master so pin drift surfaces within a day.
          ref: ${{ github.event_name == 'schedule' && 'master' || env.ROSS_REF }}
          path: ross

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config flex bison
          if [ "${{ matrix.mpi }}" = "openmpi" ]; then
            sudo apt-get install -y libopenmpi-dev openmpi-bin
          else
            sudo apt-get install -y mpich libmpich-dev
          fi

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja pkg-config flex bison
          # mpich and open-mpi conflict (both provide mpicc/mpirun), but each
          # matrix leg runs on its own runner and installs only one.
          if [ "${{ matrix.mpi }}" = "openmpi" ]; then
            brew install open-mpi
          else
            brew install mpich
          fi
          # Homebrew flex/bison are keg-only and the macOS system ones are
          # too old for flex_target/bison_target — put the brew versions
          # ahead of /usr/bin on PATH for subsequent steps.
          echo "$(brew --prefix bison)/bin" >> "$GITHUB_PATH"
          echo "$(brew --prefix flex)/bin" >> "$GITHUB_PATH"

      - name: Configure ROSS
        run: >
          cmake -S ross -B ross/build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DROSS_BUILD_MODELS=ON
          -DCMAKE_INSTALL_PREFIX=$PWD/ross-install

      - name: Build and install ROSS
        run: cmake --build ross/build --target install -j

      - name: Configure CODES
        run: >
          cmake -S codes -B codes/build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DBUILD_TESTING=ON
          -DCODES_USE_TORCH=OFF
          -DCODES_USE_ZEROMQ=OFF
          -DCMAKE_PREFIX_PATH=$PWD/ross-install

      - name: Build CODES
        run: cmake --build codes/build -j

      - name: Run CODES tests
        run: ctest --test-dir codes/build --output-on-failure

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          # Artifact names must be unique across matrix legs (upload-artifact@v4).
          name: build-logs-${{ matrix.os }}-${{ matrix.mpi }}
          path: |
            codes/build/Testing/Temporary/LastTest.log
            codes/build/Testing/Temporary/LastTestsFailed.log
            codes/build/CMakeFiles/CMakeError.log
            codes/build/CMakeFiles/CMakeOutput.log
            codes/build/CMakeCache.txt
            ross/build/CMakeFiles/CMakeError.log
            ross/build/CMakeFiles/CMakeOutput.log
            ross/build/CMakeCache.txt
          if-no-files-found: ignore
          retention-days: 14
