name: Director

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

env:
  ROSS_REF: 9b6ccb18f9b9db438bf41b5b221d0ef16a4dac48
  DIRECTOR_IMAGE: ghcr.io/codes-org/codes-ci-full:latest

jobs:
  director:
    name: director model workflows
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout CODES
        uses: actions/checkout@v4
        with:
          path: codes

      - name: Checkout ROSS
        uses: actions/checkout@v4
        with:
          repository: ROSS-org/ROSS
          ref: ${{ env.ROSS_REF }}
          path: ross

      - name: Pull full dependency image
        run: docker pull "$DIRECTOR_IMAGE"

      - name: Create Docker network
        run: docker network create codes-director-ci

      - name: Start ZeroMQ server
        run: |
          mkdir -p "$PWD/director-artifacts"

          docker run -d \
            --name director-server \
            --network codes-director-ci \
            -v "$PWD/codes:/work/codes" \
            -v "$PWD/director-artifacts:/work/director-artifacts" \
            -w /work/codes/src/surrogate/zmqml \
            -e ZMQML_ITERATION_HISTORY_LEN=2 \
            -e ZMQML_ITERATION_HORIZON=3 \
            -e ZMQML_ITERATION_TRAIN_STRIDE=1 \
            -e ZMQML_EVENT_TIME_MIN_ROWS=4 \
            -e ZMQML_EVENT_TIME_EPOCHS=2 \
            -e ZMQML_FLUID_FLOW_WAN_EPOCHS=2 \
            -e ZMQML_RECORD_LOG_PATH=/work/director-artifacts/iteration-records.csv \
            -e ZMQML_EVENT_TIME_RECORD_LOG_PATH=/work/director-artifacts/event-time-records.csv \
            "$DIRECTOR_IMAGE" \
            bash -euxo pipefail -c '
              exec python3 -u zmqmlserver.py
            '

          sleep 5
          docker ps --filter name=director-server
          docker logs director-server

      - name: Build ROSS and CODES with Director support
        run: |
          docker run --rm \
            --name codes-director-build \
            --network codes-director-ci \
            -v "$PWD/codes:/work/codes" \
            -v "$PWD/ross:/work/ross" \
            -v "$PWD/ross-install:/work/ross-install" \
            -w /work \
            "$DIRECTOR_IMAGE" \
            bash -euxo pipefail -c '
              cmake -S ross -B ross/build -G Ninja \
                -DCMAKE_BUILD_TYPE=Debug \
                -DROSS_BUILD_MODELS=ON \
                -DCMAKE_INSTALL_PREFIX=/work/ross-install

              cmake --build ross/build --target install -j

              cd /work/codes
              rm -rf build

              cmake -S . -B build -G Ninja \
                -DCMAKE_BUILD_TYPE=Debug \
                -DBUILD_TESTING=ON \
                -DCODES_USE_SWM=ON \
                -DCODES_USE_TORCH=ON \
                -DCODES_USE_ZEROMQ=ON \
                -DCODES_ENABLE_DIRECTOR_TESTS=ON \
                -DCMAKE_C_COMPILER=mpicc \
                -DCMAKE_CXX_COMPILER=mpicxx \
                -DCMAKE_PREFIX_PATH="/work/ross-install;/opt/swm;/opt/argobots" \
                -DTorch_DIR="$(python3 -c "import torch; print(torch.utils.cmake_prefix_path)")/Torch"

              cmake --build build -j
            '

      - name: Run Director tests
        run: |
          docker run --rm \
            --name codes-director-tests \
            --network codes-director-ci \
            -v "$PWD/codes:/work/codes" \
            -v "$PWD/director-artifacts:/work/director-artifacts" \
            -w /work/codes \
            -e ZMQML_ENDPOINT=tcp://director-server:5555 \
            -e ZMQML_TEST_NP=1 \
            -e ZMQML_CTL_TIMEOUT=30 \
            "$DIRECTOR_IMAGE" \
            bash -euxo pipefail -c '
              ctest --test-dir build -N -L director \
                | tee /tmp/director-ctest-list.txt

              grep -F "zmqml-iteration-time-hybrid-workflow.sh" \
                /tmp/director-ctest-list.txt
              grep -F "zmqml-event-time-hybrid-workflow.sh" \
                /tmp/director-ctest-list.txt
              grep -F "zmqml-fluid-flow-wan-hybrid-workflow.sh" \
                /tmp/director-ctest-list.txt

              ctest --test-dir build \
                -L director \
                --output-on-failure \
                --timeout 1200 \
                -VV
            '

      - name: Validate ZeroMQ server logs
        run: |
          mkdir -p "$PWD/director-artifacts"
          docker logs director-server 2>&1 | tee "$PWD/director-artifacts/director-server.log"

          require_log() {
            local pattern="$1"
            local description="$2"

            if ! grep -nE "$pattern" "$PWD/director-artifacts/director-server.log"; then
              echo "::error::Missing server-side Director evidence: $description"
              exit 1
            fi
          }

          require_log '\[zmqmlserver\] director_debug_prints=1' \
            'simulation configured the server debug flag'

          require_log '\[iteration-time records\]' \
            'iteration-time records reached the server'

          require_log '\[iteration-time inference\].*predictions=' \
            'iteration-time inference reached the server and returned predictions'

          require_log '\[event-time records\]' \
            'event-time records reached the server'

          require_log '\[event-time inference\].*predictions=' \
            'event-time inference reached the server and returned predictions'

          require_log '\[fluid-flow-wan inference\].*switch=' \
            'fluid-flow-WAN inference reached the server and returned allocations'

          test -s "$PWD/director-artifacts/iteration-records.csv"
          test -s "$PWD/director-artifacts/event-time-records.csv"

      - name: Dump ZeroMQ server logs
        if: always()
        run: docker logs director-server || true

      - name: Stop ZeroMQ server
        if: always()
        run: |
          docker rm -f director-server || true
          docker network rm codes-director-ci || true

      - name: Upload Director logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: director-logs
          path: |
            codes/build/Testing/Temporary/LastTest.log
            codes/build/Testing/Temporary/LastTestsFailed.log
            codes/build/testing-output/**
            director-artifacts/**
          if-no-files-found: ignore
          retention-days: 14
